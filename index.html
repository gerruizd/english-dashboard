<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English System — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --crema:#fdfbf6; --crema-alt:#f5f0e6; --tinta:#1a1614; --tinta-suave:#6b6560;
    --dorado:#a98a40; --dorado-suave:#c9ab5f; --navy:#0f1e3d; --verde:#556b2f;
    --rojo:#8b3a3a; --linea:#e8e2d5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Georgia,'Times New Roman',serif;background:var(--crema);color:var(--tinta);line-height:1.6;padding:48px 24px}
  .container{max-width:1180px;margin:0 auto}
  header{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--linea);display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
  .kicker{font-family:-apple-system,sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dorado);font-weight:600;margin-bottom:10px}
  h1{font-size:44px;font-weight:700;letter-spacing:-1.2px;line-height:1}
  .status{font-family:-apple-system,sans-serif;font-size:11px;color:var(--tinta-suave);text-align:right}
  .status b{color:var(--verde)}
  h2{font-size:13px;font-family:-apple-system,sans-serif;letter-spacing:2px;text-transform:uppercase;color:var(--dorado);font-weight:700;margin:48px 0 16px}

  .today{background:var(--navy);color:var(--crema);padding:28px 32px;display:grid;grid-template-columns:auto 1fr auto;gap:32px;align-items:center;margin-bottom:32px}
  .today-streak{text-align:center;padding-right:32px;border-right:1px solid rgba(253,251,246,.2)}
  .streak-num{font-size:64px;font-weight:700;letter-spacing:-3px;line-height:1;color:var(--dorado-suave)}
  .streak-lbl{font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;opacity:.75;margin-top:4px}
  .today-msg{font-size:20px;line-height:1.4}
  .today-msg em{color:var(--dorado-suave);font-style:normal;font-weight:700}
  .today-msg small{display:block;font-size:13px;opacity:.75;margin-top:6px;font-style:italic}
  .today-badge{font-family:-apple-system,sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;padding:10px 18px;border-radius:2px;white-space:nowrap}
  .badge-done{background:var(--verde);color:var(--crema)}
  .badge-pending{background:var(--dorado);color:var(--tinta)}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--linea);border:1px solid var(--linea)}
  .kpi{background:var(--crema);padding:20px}
  .kpi-label{font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tinta-suave);font-weight:600;margin-bottom:8px}
  .kpi-val{font-size:34px;font-weight:700;letter-spacing:-1.2px;line-height:1}
  .kpi-val small{font-size:16px;color:var(--tinta-suave)}
  .kpi-val .up{color:var(--verde);font-size:15px;font-weight:700;margin-left:4px}
  .kpi-sub{font-size:12px;color:var(--tinta-suave);font-style:italic;margin-top:4px}

  .cal{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .cal-day{width:30px;height:30px;border-radius:2px;background:var(--crema-alt);border:1px solid var(--linea);display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;font-size:9px;color:var(--tinta-suave)}
  .cal-day.on{background:var(--verde);border-color:var(--verde);color:var(--crema);font-weight:700}
  .cal-day.bench{background:var(--navy);border-color:var(--navy);color:var(--dorado-suave);font-weight:700}
  .cal-day.today{outline:2px solid var(--dorado);outline-offset:1px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .panel{border:1px solid var(--linea);background:var(--crema);padding:24px 28px}
  .panel h3{font-size:20px;margin-bottom:4px}
  .panel .hint{font-size:12.5px;color:var(--tinta-suave);font-style:italic;margin-bottom:18px}
  .chart-box{position:relative;height:260px}

  .rub{margin-bottom:12px}
  .rub-top{display:flex;justify-content:space-between;font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;margin-bottom:3px}
  .rub-top em{font-style:normal;color:var(--tinta-suave)}
  .rub-bar{height:8px;background:var(--linea);border-radius:2px;overflow:hidden;position:relative}
  .rub-fill{height:100%;background:var(--navy);border-radius:2px}
  .rub-goal{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--dorado)}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th{font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tinta-suave);text-align:left;padding:8px 10px 8px 0;border-bottom:1px solid var(--linea);font-weight:700}
  td{padding:10px 10px 10px 0;border-bottom:1px dotted var(--linea);vertical-align:top}
  td em{font-size:11px;color:var(--tinta-suave)}
  tr:last-child td{border-bottom:none}
  .num{text-align:right}
  .mono{font-family:'SF Mono','Courier New',monospace;font-size:13px}
  .wrong{color:var(--rojo)}.right{color:var(--verde)}
  .pill{display:inline-block;font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:2px;white-space:nowrap}
  .p-nuevo{background:var(--crema-alt);color:var(--tinta-suave)}
  .p-microdrill{background:#f3e0e0;color:var(--rojo)}
  .p-activo{background:#f5ebd8;color:var(--dorado)}
  .p-cons{background:#e6ecd9;color:var(--verde)}
  .p-adq{background:var(--verde);color:var(--crema)}

  .bar{height:22px;display:flex;border-radius:2px;overflow:hidden;background:var(--linea);margin-top:6px}
  .bar span{display:block;height:100%}
  .b-nuevo{background:#d9d2c4}.b-cons{background:var(--dorado-suave)}.b-adq{background:var(--verde)}
  .legend{font-family:-apple-system,sans-serif;font-size:10px;color:var(--tinta-suave);margin-top:12px;display:flex;gap:16px;flex-wrap:wrap}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px}
  .cat-row{margin-bottom:14px}
  .cat-name{font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;text-transform:capitalize;display:flex;justify-content:space-between}
  .cat-name em{font-style:normal;color:var(--tinta-suave);font-size:10px}

  .loading{padding:60px;text-align:center;color:var(--tinta-suave);font-style:italic}
  footer{margin-top:64px;padding-top:24px;border-top:1px solid var(--linea);font-size:11.5px;color:var(--tinta-suave);font-style:italic}
  @media(max-width:820px){
    body{padding:28px 16px}h1{font-size:32px}.grid2{grid-template-columns:1fr}
    .today{grid-template-columns:1fr;gap:20px;text-align:center}
    .today-streak{border-right:none;border-bottom:1px solid rgba(253,251,246,.2);padding:0 0 20px}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="kicker">Sistema de Inglés · B1+ → B2 profesional</div>
      <h1>Dashboard</h1>
    </div>
    <div class="status" id="status">Cargando…</div>
  </header>
  <div id="app"><div class="loading">Conectando con Supabase…</div></div>
  <footer id="foot"></footer>
</div>

<script>
const URL_BASE = 'https://zfgnbcpwrshfvhczhgzh.supabase.co/rest/v1';
const KEY = 'sb_publishable_MpRBV0j74LSWcVgunpCMTw_ayBFK3Ca';

const q = async p => {
  const r = await fetch(`${URL_BASE}/${p}`, {headers:{apikey:KEY, Authorization:`Bearer ${KEY}`}});
  if(!r.ok) throw new Error(`${p} → ${r.status}`);
  return r.json();
};
const esc = s => (s??'').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pill = s => `<span class="pill p-${s==='en_consolidacion'?'cons':s==='adquirido'?'adq':s}">${esc(s).replace(/_/g,' ')}</span>`;

async function load(){
  try{
    const [sum, streak, lastS, todayP, series, sessions, funnel, errs, due, cal] = await Promise.all([
      q('v_dashboard_summary'), q('v_streak'), q('v_last_session'), q('v_today_plan'),
      q('v_benchmark_series?order=bench_date.asc'), q('v_session_trend?order=session_date.asc'),
      q('v_chunk_funnel'), q('v_error_watchlist?limit=8'), q('v_due_today?limit=10'), q('v_calendar')
    ]);
    render(sum[0], streak[0], lastS[0], todayP[0], series, sessions, funnel, errs, due, cal);
  }catch(e){
    document.getElementById('app').innerHTML = `<div class="loading">No se pudo conectar: ${esc(e.message)}</div>`;
    document.getElementById('status').textContent = 'Sin conexión';
  }
}

function render(s, st, last, today, series, sessions, funnel, errs, due, cal){
  const base = series.length ? Number(series[0].overall) : 5.8;
  const trainedToday = cal.length && cal[cal.length-1].trained;
  const delta = last ? (Number(last.overall) - base) : 0;

  document.getElementById('status').innerHTML = `<b>● En vivo</b><br>${new Date().toLocaleString('es-MX')}`;

  const msg = trainedToday
    ? `Entrenaste hoy. Foco: <em>${esc(last.focus)}</em>.
       <small>${last.self_corrections} autocorrecciones · precisión en pasado ${Number(last.past_tense_accuracy||0).toFixed(0)}%</small>`
    : today
      ? `Toca sesión. Foco de hoy: <em>${esc(today.focus)}</em>.
         <small>${today.chunks_due} chunks por repasar · drill ${esc(today.drill_type||'3/2/1')}</small>`
      : `Sin plan cargado para hoy. <small>Pídele a Claude la clase del día.</small>`;

  const banner = `
  <div class="today">
    <div class="today-streak">
      <div class="streak-num">${st.current_streak}</div>
      <div class="streak-lbl">días seguidos</div>
    </div>
    <div class="today-msg">${msg}</div>
    <div class="today-badge ${trainedToday?'badge-done':'badge-pending'}">${trainedToday ? '✓ Hecho' : '○ Pendiente'}</div>
  </div>`;

  const kpis = `
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">Última sesión</div>
      <div class="kpi-val">${last ? Number(last.overall).toFixed(1) : '—'}${delta>0 ? `<span class="up">▲${delta.toFixed(1)}</span>` : ''}</div>
      <div class="kpi-sub">baseline ${base.toFixed(1)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Días entrenados</div>
      <div class="kpi-val">${st.total_days}</div>
      <div class="kpi-sub">${st.days_last_7}/7 esta semana</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Mejor racha</div>
      <div class="kpi-val">${st.longest_streak}</div>
      <div class="kpi-sub">días consecutivos</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Pasado correcto</div>
      <div class="kpi-val">${last?.past_tense_accuracy ? Number(last.past_tense_accuracy).toFixed(0)+'%' : '—'}</div>
      <div class="kpi-sub">meta: 90%</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Chunks adquiridos</div>
      <div class="kpi-val">${s.chunks_adquiridos}<small>/${s.chunks_total}</small></div>
      <div class="kpi-sub">${s.chunks_due} por repasar</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Errores superados</div>
      <div class="kpi-val">${s.errores_superados}</div>
      <div class="kpi-sub">${s.errores_microdrill} en microdrill</div>
    </div>
  </div>`;

  const calHtml = cal.map((d,i)=>{
    const day = new Date(d.day+'T12:00:00');
    const isToday = i === cal.length-1;
    const cls = [d.trained ? (d.kind==='benchmark'?'bench':'on') : '', isToday?'today':''].filter(Boolean).join(' ');
    return `<div class="cal-day ${cls}" title="${d.day}${d.overall?' · '+d.overall:''}">${day.getDate()}</div>`;
  }).join('');

  const cats = [['Fluidez','score_fluidez'],['Gramática','score_gramatica'],['Recuperación','score_recuperacion'],
                ['Estructura','score_estructura'],['Claridad','score_claridad'],['Impacto','score_impacto']];
  const rub = last ? cats.map(([n,k])=>{
    const v = Number(last[k]||0);
    return `<div class="rub">
      <div class="rub-top"><span>${n}</span><em>${v.toFixed(1)}</em></div>
      <div class="rub-bar"><div class="rub-fill" style="width:${v*10}%"></div><div class="rub-goal" style="left:75%"></div></div>
    </div>`;
  }).join('') : '<em>Sin sesiones aún.</em>';

  const funnelHtml = funnel.map(f=>{
    const t=f.total||1;
    return `<div class="cat-row">
      <div class="cat-name"><span>${esc(f.category)}</span><em>${f.adquiridos}/${f.total}</em></div>
      <div class="bar">
        <span class="b-adq" style="width:${100*f.adquiridos/t}%"></span>
        <span class="b-cons" style="width:${100*f.en_consolidacion/t}%"></span>
        <span class="b-nuevo" style="width:${100*f.nuevos/t}%"></span>
      </div></div>`;
  }).join('');

  const errsHtml = errs.map(e=>`<tr>
      <td><strong>${esc(e.pattern)}</strong><br>
        <span class="mono wrong">✕ ${esc(e.example_wrong)}</span><br>
        <span class="mono right">✓ ${esc(e.example_right)}</span></td>
      <td>${pill(e.state)}</td>
      <td class="num"><strong>${e.occurrences}</strong><br><em>${e.self_corrections} autoc.</em></td>
    </tr>`).join('');

  const dueHtml = due.length ? due.map(d=>`<tr>
      <td class="mono">${esc(d.text)}</td><td>${pill(d.state)}</td><td class="num"><em>${d.interval_days}d</em></td>
    </tr>`).join('') : `<tr><td colspan="3"><em>Nada pendiente hoy.</em></td></tr>`;

  document.getElementById('app').innerHTML = banner + kpis + `
  <h2>Consistencia</h2>
  <div class="panel">
    <h3>Últimos 28 días</h3>
    <p class="hint">Media hora diaria sostenida le gana a una hora que abandonas. La consistencia es la variable, no el volumen.</p>
    <div class="cal">${calHtml}</div>
    <div class="legend">
      <span><i style="background:var(--verde)"></i>Sesión</span>
      <span><i style="background:var(--navy)"></i>Benchmark</span>
      <span><i style="background:var(--crema-alt);border:1px solid var(--linea)"></i>Sin entrenar</span>
    </div>
  </div>

  <h2>Progreso</h2>
  <div class="grid2">
    <div class="panel">
      <h3>Score por sesión</h3>
      <p class="hint">Los scores de sesión son ruidosos: los pone el modelo de voz. La verdad está en el benchmark del viernes.</p>
      <div class="chart-box"><canvas id="c1"></canvas></div>
    </div>
    <div class="panel">
      <h3>Rúbrica — última sesión</h3>
      <p class="hint">La línea dorada es la meta B2 (7.5). Gramática y recuperación son el cuello de botella.</p>
      ${rub}
    </div>
  </div>

  <h2>Motor de aprendizaje</h2>
  <div class="grid2">
    <div class="panel">
      <h3>Funnel de chunks</h3>
      <p class="hint">De pasivo a automático. Empujar todo hacia la izquierda.</p>
      ${funnelHtml}
      <div class="legend">
        <span><i class="b-adq"></i>Adquirido</span><span><i class="b-cons"></i>En consolidación</span><span><i class="b-nuevo"></i>Nuevo</span>
      </div>
    </div>
    <div class="panel">
      <h3>Repasos de hoy</h3>
      <p class="hint">Intervalos 1 → 3 → 7 → 21 días. Un fallo resetea a 1.</p>
      <table><thead><tr><th>Chunk</th><th>Estado</th><th class="num">Int.</th></tr></thead><tbody>${dueHtml}</tbody></table>
    </div>
  </div>

  <h2>Watchlist de errores</h2>
  <div class="panel">
    <h3>Qué vigilar</h3>
    <p class="hint">3 ocurrencias → microdrill. 3 autocorrecciones en contextos distintos → consolidación. 3 sesiones limpias → superado.</p>
    <table><thead><tr><th>Patrón</th><th>Estado</th><th class="num">Veces</th></tr></thead><tbody>${errsHtml}</tbody></table>
  </div>`;

  document.getElementById('foot').innerHTML =
    `Datos en vivo desde Supabase · lectura con RLS. Escritura únicamente vía Claude (MCP).
     Baseline: reporte diagnóstico, julio 2026 · ${sessions.length} ${sessions.length===1?'sesión registrada':'sesiones registradas'}.`;

  drawChart(series, sessions, base);
}

function drawChart(series, sessions, base){
  const G = getComputedStyle(document.documentElement);
  const navy=G.getPropertyValue('--navy').trim(), dorado=G.getPropertyValue('--dorado').trim(),
        linea=G.getPropertyValue('--linea').trim(), verde=G.getPropertyValue('--verde').trim();
  Chart.defaults.font.family='Georgia, serif';
  Chart.defaults.color=G.getPropertyValue('--tinta-suave').trim();

  const labels = sessions.map((x,i)=>`S${i+1}`);
  const data = sessions.map(x=>Number(x.overall));

  new Chart(document.getElementById('c1'),{
    type:'line',
    data:{labels: labels.length?labels:['—'], datasets:[
      {label:'Sesión', data:data, borderColor:navy, backgroundColor:'rgba(15,30,61,.08)',
       borderWidth:2.5, fill:true, tension:.3, pointRadius:5, pointBackgroundColor:navy},
      {label:`Baseline (${base.toFixed(1)})`, data:labels.map(()=>base), borderColor:verde,
       borderWidth:1.5, borderDash:[4,4], pointRadius:0, fill:false},
      {label:'Meta B2 (7.5)', data:labels.map(()=>7.5), borderColor:dorado,
       borderWidth:1.5, borderDash:[5,4], pointRadius:0, fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{y:{min:4,max:10,grid:{color:linea}},x:{grid:{display:false}}},
      plugins:{legend:{labels:{boxWidth:12,font:{size:10}}}}}
  });
}

load();
</script>
</body>
</html>
