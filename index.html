<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English System — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --crema:#fdfbf6; --crema-alt:#f5f0e6; --tinta:#1a1614; --tinta-suave:#6b6560;
    --dorado:#a98a40; --dorado-suave:#c9ab5f; --navy:#0f1e3d; --verde:#556b2f;
    --rojo:#8b3a3a; --linea:#e8e2d5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Georgia,'Times New Roman',serif;background:var(--crema);color:var(--tinta);line-height:1.6;padding:48px 24px}
  .container{max-width:1180px;margin:0 auto}
  header{margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--linea);display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
  .kicker{font-family:-apple-system,sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dorado);font-weight:600;margin-bottom:10px}
  h1{font-size:44px;font-weight:700;letter-spacing:-1.2px;line-height:1}
  .status{font-family:-apple-system,sans-serif;font-size:11px;color:var(--tinta-suave);text-align:right}
  .status b{color:var(--verde)}
  h2{font-size:13px;font-family:-apple-system,sans-serif;letter-spacing:2px;text-transform:uppercase;color:var(--dorado);font-weight:700;margin:48px 0 16px}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;background:var(--linea);border:1px solid var(--linea)}
  .kpi{background:var(--crema);padding:22px 20px}
  .kpi-label{font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tinta-suave);font-weight:600;margin-bottom:8px}
  .kpi-val{font-size:38px;font-weight:700;letter-spacing:-1.5px;line-height:1}
  .kpi-sub{font-size:12px;color:var(--tinta-suave);font-style:italic;margin-top:4px}
  .kpi.hero{background:var(--navy);color:var(--crema)}
  .kpi.hero .kpi-label{color:var(--dorado-suave)}
  .kpi.hero .kpi-val{color:var(--dorado-suave)}
  .kpi.hero .kpi-sub{color:var(--crema);opacity:.8}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .panel{border:1px solid var(--linea);background:var(--crema);padding:24px 28px}
  .panel h3{font-size:20px;margin-bottom:4px}
  .panel .hint{font-size:12.5px;color:var(--tinta-suave);font-style:italic;margin-bottom:18px}
  .chart-box{position:relative;height:260px}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th{font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tinta-suave);text-align:left;padding:8px 10px 8px 0;border-bottom:1px solid var(--linea);font-weight:700}
  td{padding:10px 10px 10px 0;border-bottom:1px dotted var(--linea);vertical-align:top}
  tr:last-child td{border-bottom:none}
  .mono{font-family:'SF Mono','Courier New',monospace;font-size:13px}
  .wrong{color:var(--rojo)}
  .right{color:var(--verde)}
  .pill{display:inline-block;font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:2px;white-space:nowrap}
  .p-nuevo{background:var(--crema-alt);color:var(--tinta-suave)}
  .p-microdrill{background:#f3e0e0;color:var(--rojo)}
  .p-activo{background:#f5ebd8;color:var(--dorado)}
  .p-cons{background:#e6ecd9;color:var(--verde)}
  .p-adq{background:var(--verde);color:var(--crema)}

  .bar{height:22px;display:flex;border-radius:2px;overflow:hidden;background:var(--linea);margin-top:6px}
  .bar span{display:block;height:100%}
  .b-nuevo{background:#d9d2c4}.b-cons{background:var(--dorado-suave)}.b-adq{background:var(--verde)}
  .legend{font-family:-apple-system,sans-serif;font-size:10px;color:var(--tinta-suave);margin-top:10px;display:flex;gap:16px;flex-wrap:wrap}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px}
  .cat-row{margin-bottom:14px}
  .cat-name{font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;text-transform:capitalize;display:flex;justify-content:space-between}
  .cat-name em{font-style:normal;color:var(--tinta-suave);font-size:10px}

  .loading,.err{padding:40px;text-align:center;color:var(--tinta-suave);font-style:italic}
  .err{color:var(--rojo)}
  footer{margin-top:64px;padding-top:24px;border-top:1px solid var(--linea);font-size:11.5px;color:var(--tinta-suave);font-style:italic}
  @media(max-width:820px){body{padding:28px 16px}h1{font-size:32px}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="kicker">Sistema de Inglés · B1+ → B2 profesional</div>
      <h1>Dashboard</h1>
    </div>
    <div class="status" id="status">Conectando…</div>
  </header>

  <div id="app"><div class="loading">Cargando datos desde Supabase…</div></div>

  <footer id="foot"></footer>
</div>

<script>
const URL_BASE = 'https://zfgnbcpwrshfvhczhgzh.supabase.co/rest/v1';
const KEY = 'sb_publishable_MpRBV0j74LSWcVgunpCMTw_ayBFK3Ca';

// Snapshot de respaldo: se usa solo si el fetch está bloqueado
// (p.ej. dentro del preview sandboxed de Claude, que no permite red externa).
// Al abrir este archivo en tu navegador, los datos son en vivo.
const SNAPSHOT = {"sum":{"total_sessions":0,"sessions_last_7d":0,"chunks_adquiridos":0,"chunks_total":41,"chunks_due":41,"errores_activos":13,"errores_microdrill":0,"errores_superados":0,"historias_listas":0,"historias_total":10,"last_benchmark":5.8,"baseline_benchmark":5.8},"series":[{"bench_date":"2026-07-12","week_number":0,"overall":5.8,"score_fluidez":6,"score_gramatica":5,"score_recuperacion":5,"score_estructura":6,"score_claridad":7,"score_impacto":6,"past_tense_accuracy":null,"errors_per_100w":null,"delta_vs_prev":null}],"funnel":[{"category":"acciones","nuevos":7,"en_consolidacion":0,"adquiridos":0,"total":7},{"category":"colocaciones","nuevos":3,"en_consolidacion":0,"adquiridos":0,"total":3},{"category":"cotidiano","nuevos":6,"en_consolidacion":0,"adquiridos":0,"total":6},{"category":"ganar_tiempo","nuevos":7,"en_consolidacion":0,"adquiridos":0,"total":7},{"category":"liderazgo","nuevos":6,"en_consolidacion":0,"adquiridos":0,"total":6},{"category":"problemas","nuevos":5,"en_consolidacion":0,"adquiridos":0,"total":5},{"category":"resultados","nuevos":7,"en_consolidacion":0,"adquiridos":0,"total":7}],"errs":[{"id":1,"pattern":"Pasado simple inconsistente en narración","category":"gramatica","example_wrong":"I wake up late / I watch the match","example_right":"I woke up late / I watched the match","state":"activo","occurrences":6,"self_corrections":0,"priority":1},{"id":3,"pattern":"Orden de palabras calcado del español","category":"orden","example_wrong":"Cristóbal wake up me","example_right":"Cristóbal woke me up","state":"activo","occurrences":4,"self_corrections":0,"priority":1},{"id":2,"pattern":"Terminaciones -ed poco audibles","category":"pronunciacion","example_wrong":"ask ≈ asked","example_right":"asked /t/, improved /d/, wanted /ɪd/","state":"activo","occurrences":3,"self_corrections":0,"priority":1},{"id":6,"pattern":"work in vs work on","category":"preposiciones","example_wrong":"I'm working in the app","example_right":"I'm working on the app","state":"activo","occurrences":3,"self_corrections":0,"priority":1},{"id":9,"pattern":"Presente continuo mal formado","category":"gramatica","example_wrong":"I'm work right now","example_right":"I'm working right now","state":"activo","occurrences":2,"self_corrections":0,"priority":1},{"id":5,"pattern":"Omisión del objeto directo","category":"gramatica","example_wrong":"We launched in two weeks","example_right":"We launched it in two weeks","state":"activo","occurrences":2,"self_corrections":0,"priority":1},{"id":11,"pattern":"Palabras genéricas (do/make/thing/good)","category":"colocaciones","example_wrong":"we make an increase / a good result","example_right":"we drove a 30% increase / a strong result","state":"activo","occurrences":4,"self_corrections":0,"priority":2},{"id":7,"pattern":"at home vs on my home","category":"preposiciones","example_wrong":"I stay on my home","example_right":"I stayed at home","state":"activo","occurrences":3,"self_corrections":0,"priority":2}],"due":[{"id":1,"text":"I led the project from discovery to launch.","state":"nuevo","interval_days":1},{"id":2,"text":"I was responsible for the product strategy.","state":"nuevo","interval_days":1},{"id":3,"text":"I coordinated a cross-functional team.","state":"nuevo","interval_days":1},{"id":4,"text":"I aligned both teams.","state":"nuevo","interval_days":1},{"id":5,"text":"My role was to lead the solution.","state":"nuevo","interval_days":1},{"id":6,"text":"I worked closely with the sales team.","state":"nuevo","interval_days":1},{"id":7,"text":"The main problem was a misalignment between marketing and sales.","state":"nuevo","interval_days":1},{"id":8,"text":"We identified a gap between what marketing delivered and what sales needed.","state":"nuevo","interval_days":1},{"id":9,"text":"The process was taking too much time.","state":"nuevo","interval_days":1},{"id":10,"text":"We were generating leads, but they were not converting.","state":"nuevo","interval_days":1}],"trend":[]};

let LIVE = false;

async function q(path){
  const r = await fetch(`${URL_BASE}/${path}`, {headers:{apikey:KEY, Authorization:`Bearer ${KEY}`}});
  if(!r.ok) throw new Error(`${path} → ${r.status}`);
  return r.json();
}

const esc = s => (s??'').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pill = s => `<span class="pill p-${s==='en_consolidacion'?'cons':s==='adquirido'?'adq':s}">${s.replace(/_/g,' ')}</span>`;

async function load(){
  try{
    const [sum, series, funnel, errs, due, trend] = await Promise.all([
      q('v_dashboard_summary'),
      q('v_benchmark_series?order=bench_date.asc'),
      q('v_chunk_funnel'),
      q('v_error_watchlist?limit=8'),
      q('v_due_today?limit=10'),
      q('v_session_trend?order=session_date.asc&limit=60')
    ]);
    LIVE = true;
    render(sum[0], series, funnel, errs, due, trend);
  }catch(e){
    LIVE = false;
    const S = SNAPSHOT;
    render(S.sum, S.series, S.funnel, S.errs, S.due, S.trend);
  }
}

function render(s, series, funnel, errs, due, trend){
  const last = series.length ? series[series.length-1] : null;
  const base = series.length ? series[0] : null;
  const delta = (last && base) ? (last.overall - base.overall) : 0;
  const pctChunks = s.chunks_total ? Math.round(100*s.chunks_adquiridos/s.chunks_total) : 0;

  document.getElementById('status').innerHTML = LIVE
    ? `<b>● En vivo</b> · proyecto <span class="mono">English</span><br>${new Date().toLocaleString('es-MX')}`
    : `<b style="color:var(--dorado)">◐ Snapshot</b> · red bloqueada en el preview<br>Descarga el archivo y ábrelo para datos en vivo`;

  const kpis = `
  <div class="kpis">
    <div class="kpi hero">
      <div class="kpi-label">Benchmark actual</div>
      <div class="kpi-val">${last ? Number(last.overall).toFixed(1) : '—'}</div>
      <div class="kpi-sub">${base ? `baseline ${Number(base.overall).toFixed(1)} · ${delta>=0?'+':''}${delta.toFixed(1)}` : 'sin datos'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Sesiones (7 días)</div>
      <div class="kpi-val">${s.sessions_last_7d}<span style="font-size:18px;color:var(--tinta-suave)">/7</span></div>
      <div class="kpi-sub">${s.total_sessions} en total</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Chunks adquiridos</div>
      <div class="kpi-val">${s.chunks_adquiridos}<span style="font-size:18px;color:var(--tinta-suave)">/${s.chunks_total}</span></div>
      <div class="kpi-sub">${pctChunks}% automatizado</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Repasos hoy</div>
      <div class="kpi-val">${s.chunks_due}</div>
      <div class="kpi-sub">${s.errores_microdrill} en microdrill</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Errores superados</div>
      <div class="kpi-val">${s.errores_superados}</div>
      <div class="kpi-sub">${s.errores_activos} activos</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Historias listas</div>
      <div class="kpi-val">${s.historias_listas}<span style="font-size:18px;color:var(--tinta-suave)">/${s.historias_total}</span></div>
      <div class="kpi-sub">banco de entrevista</div>
    </div>
  </div>`;

  const charts = `
  <h2>La métrica que cuenta</h2>
  <div class="grid2">
    <div class="panel">
      <h3>Serie del benchmark</h3>
      <p class="hint">Mismas 3 tareas cada viernes. Comparable contra tu propia línea base — no contra un nativo.</p>
      <div class="chart-box"><canvas id="c1"></canvas></div>
    </div>
    <div class="panel">
      <h3>Rúbrica por categoría</h3>
      <p class="hint">Dónde está el cuello de botella hoy. Gramática y recuperación arrancan más bajo por diseño.</p>
      <div class="chart-box"><canvas id="c2"></canvas></div>
    </div>
  </div>`;

  const funnelHtml = funnel.map(f=>{
    const t = f.total || 1;
    return `<div class="cat-row">
      <div class="cat-name"><span>${esc(f.category)}</span><em>${f.adquiridos}/${f.total}</em></div>
      <div class="bar">
        <span class="b-adq" style="width:${100*f.adquiridos/t}%"></span>
        <span class="b-cons" style="width:${100*f.en_consolidacion/t}%"></span>
        <span class="b-nuevo" style="width:${100*f.nuevos/t}%"></span>
      </div></div>`;
  }).join('');

  const errsHtml = errs.map(e=>`<tr>
      <td><strong>${esc(e.pattern)}</strong><br>
          <span class="mono wrong">✕ ${esc(e.example_wrong)}</span><br>
          <span class="mono right">✓ ${esc(e.example_right)}</span></td>
      <td>${pill(e.state)}</td>
      <td style="text-align:right"><strong>${e.occurrences}</strong><br>
          <span style="font-size:11px;color:var(--tinta-suave)">${e.self_corrections} autocorr.</span></td>
    </tr>`).join('');

  const dueHtml = due.length ? due.map(d=>`<tr>
      <td class="mono">${esc(d.text)}</td>
      <td>${pill(d.state)}</td>
      <td style="text-align:right;font-size:12px;color:var(--tinta-suave)">${d.interval_days}d</td>
    </tr>`).join('') : `<tr><td colspan="3" style="color:var(--tinta-suave);font-style:italic">Nada pendiente hoy.</td></tr>`;

  const tables = `
  <h2>Motor de aprendizaje</h2>
  <div class="grid2">
    <div class="panel">
      <h3>Funnel de chunks</h3>
      <p class="hint">De pasivo a automático. El objetivo es empujar todo hacia la izquierda.</p>
      ${funnelHtml}
      <div class="legend">
        <span><i class="b-adq"></i>Adquirido (uso espontáneo)</span>
        <span><i class="b-cons"></i>En consolidación</span>
        <span><i class="b-nuevo"></i>Nuevo</span>
      </div>
    </div>
    <div class="panel">
      <h3>Repasos de hoy</h3>
      <p class="hint">Intervalos expansivos: 1 → 3 → 7 → 21 días. Un fallo resetea a 1.</p>
      <table><thead><tr><th>Chunk</th><th>Estado</th><th style="text-align:right">Intervalo</th></tr></thead>
      <tbody>${dueHtml}</tbody></table>
    </div>
  </div>

  <h2>Watchlist de errores</h2>
  <div class="panel">
    <h3>Qué vigilar</h3>
    <p class="hint">3 ocurrencias activan microdrill automático. 3 autocorrecciones en contextos distintos → consolidación. 3 sesiones limpias → superado.</p>
    <table><thead><tr><th>Patrón</th><th>Estado</th><th style="text-align:right">Veces</th></tr></thead>
    <tbody>${errsHtml}</tbody></table>
  </div>`;

  document.getElementById('app').innerHTML = kpis + charts + tables;
  document.getElementById('foot').innerHTML = LIVE
    ? `Datos en vivo desde Supabase · proyecto <span class="mono">English</span> · lectura con publishable key + RLS.
       Escritura únicamente vía Claude (MCP). Baseline: reporte diagnóstico, julio 2026.`
    : `<strong>Modo snapshot.</strong> El preview de Claude corre en un iframe sin acceso a red externa, así que el
       <span class="mono">fetch</span> a Supabase no sale. Los datos mostrados son una copia del estado real al momento de generar
       este archivo. Descárgalo y ábrelo en tu navegador (o publícalo en Vercel) y se conectará en vivo automáticamente —
       no hay que cambiar nada en el código.`;

  drawCharts(series, trend, last);
}

function drawCharts(series, trend, last){
  const G = getComputedStyle(document.documentElement);
  const navy = G.getPropertyValue('--navy').trim();
  const dorado = G.getPropertyValue('--dorado').trim();
  const linea = G.getPropertyValue('--linea').trim();
  const suave = G.getPropertyValue('--tinta-suave').trim();
  Chart.defaults.font.family = 'Georgia, serif';
  Chart.defaults.color = suave;

  const labels = series.map(b => b.week_number===0 ? 'Base' : `S${b.week_number}`);
  new Chart(document.getElementById('c1'), {
    type:'line',
    data:{labels, datasets:[
      {label:'Overall', data:series.map(b=>Number(b.overall)), borderColor:navy, backgroundColor:'rgba(15,30,61,.08)',
       borderWidth:2.5, fill:true, tension:.3, pointRadius:4, pointBackgroundColor:navy},
      {label:'Meta B2 (7.5)', data:series.map(()=>7.5), borderColor:dorado, borderWidth:1.5,
       borderDash:[5,4], pointRadius:0, fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{y:{min:0,max:10,grid:{color:linea}},x:{grid:{display:false}}},
      plugins:{legend:{labels:{boxWidth:12,font:{size:11}}}}}
  });

  const cats = ['Fluidez','Gramática','Recuperación','Estructura','Claridad','Impacto'];
  const vals = last ? [last.score_fluidez,last.score_gramatica,last.score_recuperacion,
                       last.score_estructura,last.score_claridad,last.score_impacto].map(Number) : [0,0,0,0,0,0];
  new Chart(document.getElementById('c2'), {
    type:'radar',
    data:{labels:cats, datasets:[
      {label:'Actual', data:vals, borderColor:navy, backgroundColor:'rgba(15,30,61,.12)',
       borderWidth:2, pointBackgroundColor:navy, pointRadius:3},
      {label:'Meta B2', data:[7.5,7.5,7.5,7.5,7.5,7.5], borderColor:dorado, borderWidth:1.5,
       borderDash:[5,4], pointRadius:0, backgroundColor:'transparent'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{r:{min:0,max:10,ticks:{stepSize:2,backdropColor:'transparent',font:{size:9}},
                 grid:{color:linea},angleLines:{color:linea},pointLabels:{font:{size:11}}}},
      plugins:{legend:{labels:{boxWidth:12,font:{size:11}}}}}
  });
}

load();
</script>
</body>
</html>
