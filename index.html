<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English System — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --crema:#fdfbf6; --crema-alt:#f5f0e6; --tinta:#1a1614; --tinta-suave:#6b6560;
    --dorado:#a98a40; --dorado-suave:#c9ab5f; --navy:#0f1e3d; --verde:#556b2f;
    --rojo:#8b3a3a; --linea:#e8e2d5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Georgia,'Times New Roman',serif;background:var(--crema);color:var(--tinta);line-height:1.6;padding:48px 24px}
  .container{max-width:1180px;margin:0 auto}
  header{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--linea);display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
  .kicker{font-family:-apple-system,sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dorado);font-weight:600;margin-bottom:10px}
  h1{font-size:44px;font-weight:700;letter-spacing:-1.2px;line-height:1}
  .status{font-family:-apple-system,sans-serif;font-size:11px;color:var(--tinta-suave);text-align:right}
  .status b{color:var(--verde)}
  h2{font-size:13px;font-family:-apple-system,sans-serif;letter-spacing:2px;text-transform:uppercase;color:var(--dorado);font-weight:700;margin:48px 0 16px}

  /* ---- TOOLTIPS ---- */
  .i{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;
     border:1px solid var(--tinta-suave);color:var(--tinta-suave);font-family:-apple-system,sans-serif;
     font-size:9px;font-weight:700;cursor:pointer;margin-left:5px;vertical-align:middle;
     flex-shrink:0;user-select:none;transition:all .15s;line-height:1}
  .i:hover,.i.on{background:var(--dorado);border-color:var(--dorado);color:var(--crema)}
  .today .i{border-color:rgba(253,251,246,.5);color:rgba(253,251,246,.8)}
  .today .i:hover,.today .i.on{background:var(--dorado-suave);border-color:var(--dorado-suave);color:var(--navy)}
  #tip{position:absolute;z-index:200;max-width:300px;background:var(--tinta);color:var(--crema);
       padding:12px 15px;border-radius:3px;font-family:-apple-system,sans-serif;font-size:12.5px;
       line-height:1.5;box-shadow:0 6px 24px rgba(26,22,20,.25);opacity:0;pointer-events:none;
       transition:opacity .15s;font-weight:400}
  #tip.show{opacity:1}
  #tip b{color:var(--dorado-suave)}

  .today{background:var(--navy);color:var(--crema);padding:28px 32px;display:grid;grid-template-columns:auto 1fr auto;gap:32px;align-items:center;margin-bottom:32px}
  .today-streak{text-align:center;padding-right:32px;border-right:1px solid rgba(253,251,246,.2)}
  .streak-num{font-size:64px;font-weight:700;letter-spacing:-3px;line-height:1;color:var(--dorado-suave)}
  .streak-lbl{font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;opacity:.75;margin-top:4px}
  .today-msg{font-size:20px;line-height:1.4}
  .today-msg em{color:var(--dorado-suave);font-style:normal;font-weight:700}
  .today-msg small{display:block;font-size:13px;opacity:.75;margin-top:6px;font-style:italic}
  .today-badge{font-family:-apple-system,sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;padding:10px 18px;border-radius:2px;white-space:nowrap}
  .badge-done{background:var(--verde);color:var(--crema)}
  .badge-pending{background:var(--dorado);color:var(--tinta)}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--linea);border:1px solid var(--linea)}
  .kpi{background:var(--crema);padding:20px}
  .kpi-label{font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tinta-suave);font-weight:600;margin-bottom:8px;display:flex;align-items:center}
  .kpi-val{font-size:34px;font-weight:700;letter-spacing:-1.2px;line-height:1}
  .kpi-val small{font-size:16px;color:var(--tinta-suave)}
  .kpi-val .up{color:var(--verde);font-size:15px;font-weight:700;margin-left:4px}
  .kpi-sub{font-size:12px;color:var(--tinta-suave);font-style:italic;margin-top:4px}

  .cal{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
  .cal-day{width:30px;height:30px;border-radius:2px;background:var(--crema-alt);border:1px solid var(--linea);display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;font-size:9px;color:var(--tinta-suave)}
  .cal-day.on{background:var(--verde);border-color:var(--verde);color:var(--crema);font-weight:700}
  .cal-day.bench{background:var(--navy);border-color:var(--navy);color:var(--dorado-suave);font-weight:700}
  .cal-day.today{outline:2px solid var(--dorado);outline-offset:1px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .panel{border:1px solid var(--linea);background:var(--crema);padding:24px 28px}
  .panel h3{font-size:20px;margin-bottom:4px;display:flex;align-items:center}
  .panel .hint{font-size:12.5px;color:var(--tinta-suave);font-style:italic;margin-bottom:18px}
  .chart-box{position:relative;height:260px}

  .rub{margin-bottom:12px}
  .rub-top{display:flex;justify-content:space-between;font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;margin-bottom:3px}
  .rub-top em{font-style:normal;color:var(--tinta-suave)}
  .rub-bar{height:8px;background:var(--linea);border-radius:2px;overflow:hidden;position:relative}
  .rub-fill{height:100%;background:var(--navy);border-radius:2px}
  .rub-goal{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--dorado)}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th{font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tinta-suave);text-align:left;padding:8px 10px 8px 0;border-bottom:1px solid var(--linea);font-weight:700}
  td{padding:10px 10px 10px 0;border-bottom:1px dotted var(--linea);vertical-align:top}
  td em{font-size:11px;color:var(--tinta-suave)}
  tr:last-child td{border-bottom:none}
  .num{text-align:right}
  .mono{font-family:'SF Mono','Courier New',monospace;font-size:13px}
  .wrong{color:var(--rojo)}.right{color:var(--verde)}
  .pill{display:inline-block;font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:2px;white-space:nowrap}
  .p-nuevo{background:var(--crema-alt);color:var(--tinta-suave)}
  .p-microdrill{background:#f3e0e0;color:var(--rojo)}
  .p-activo{background:#f5ebd8;color:var(--dorado)}
  .p-cons{background:#e6ecd9;color:var(--verde)}
  .p-adq{background:var(--verde);color:var(--crema)}

  .bar{height:22px;display:flex;border-radius:2px;overflow:hidden;background:var(--linea);margin-top:6px}
  .bar span{display:block;height:100%}
  .b-nuevo{background:#d9d2c4}.b-cons{background:var(--dorado-suave)}.b-adq{background:var(--verde)}
  .legend{font-family:-apple-system,sans-serif;font-size:10px;color:var(--tinta-suave);margin-top:12px;display:flex;gap:16px;flex-wrap:wrap}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px}
  .cat-row{margin-bottom:14px}
  .cat-name{font-family:-apple-system,sans-serif;font-size:11px;font-weight:600;text-transform:capitalize;display:flex;justify-content:space-between}
  .cat-name em{font-style:normal;color:var(--tinta-suave);font-size:10px}

  /* ---- METODOLOGÍA ---- */
  .method{border:1px solid var(--linea);background:var(--crema)}
  .method-head{padding:26px 30px;border-bottom:1px solid var(--linea);display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:16px}
  .method-head:hover{background:var(--crema-alt)}
  .method-head h3{font-size:24px;margin-bottom:4px}
  .method-head p{font-size:13.5px;color:var(--tinta-suave);font-style:italic}
  .chev{font-family:-apple-system,sans-serif;font-size:20px;color:var(--dorado);transition:transform .2s;flex-shrink:0}
  .method.open .chev{transform:rotate(180deg)}
  .method-body{display:none;padding:30px}
  .method.open .method-body{display:block}
  .tech{display:grid;grid-template-columns:34px 1fr;gap:16px;padding:18px 0;border-bottom:1px dotted var(--linea)}
  .tech:last-of-type{border-bottom:none}
  .tech-n{font-family:-apple-system,sans-serif;font-size:12px;font-weight:700;color:var(--crema);background:var(--navy);
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .tech h4{font-size:18px;margin-bottom:5px}
  .tech p{font-size:14.5px;margin-bottom:6px}
  .ev{font-family:-apple-system,sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:700;
    padding:2px 7px;border-radius:2px;margin-left:8px;vertical-align:middle}
  .ev-alta{background:#e6ecd9;color:var(--verde)}
  .ev-media{background:#f5ebd8;color:var(--dorado)}
  .src{font-size:12.5px;color:var(--tinta-suave);font-style:italic}
  .rules{background:var(--crema-alt);padding:20px 24px;margin-top:24px;border-left:3px solid var(--dorado)}
  .rules h4{font-family:-apple-system,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dorado);font-weight:700;margin-bottom:12px}
  .rules ul{list-style:none;font-size:14px}
  .rules li{padding:5px 0 5px 20px;position:relative}
  .rules li:before{content:'→';position:absolute;left:0;color:var(--dorado)}
  .caveat{background:var(--tinta);color:var(--crema);padding:22px 26px;margin-top:24px}
  .caveat h4{color:var(--dorado);font-size:16px;margin-bottom:8px}
  .caveat p{font-size:14px;opacity:.9;margin:0}
  .refs{margin-top:24px;padding-top:20px;border-top:1px solid var(--linea)}
  .refs h4{font-family:-apple-system,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dorado);font-weight:700;margin-bottom:12px}
  .refs ol{font-size:13px;color:var(--tinta-suave);padding-left:20px}
  .refs li{padding:4px 0}
  .refs b{color:var(--tinta);font-weight:700}

  .loading{padding:60px;text-align:center;color:var(--tinta-suave);font-style:italic}
  footer{margin-top:64px;padding-top:24px;border-top:1px solid var(--linea);font-size:11.5px;color:var(--tinta-suave);font-style:italic}
  @media(max-width:820px){
    body{padding:28px 16px}h1{font-size:32px}.grid2{grid-template-columns:1fr}
    .today{grid-template-columns:1fr;gap:20px;text-align:center}
    .today-streak{border-right:none;border-bottom:1px solid rgba(253,251,246,.2);padding:0 0 20px}
    .kpi-label{justify-content:center}.kpi{text-align:center}
    #tip{max-width:260px}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="kicker">Sistema de Inglés · B1+ → B2 profesional</div>
      <h1>Dashboard</h1>
    </div>
    <div class="status" id="status">Cargando…</div>
  </header>
  <div id="app"><div class="loading">Conectando con Supabase…</div></div>
  <footer id="foot"></footer>
</div>
<div id="tip"></div>

<script>
const URL_BASE = 'https://zfgnbcpwrshfvhczhgzh.supabase.co/rest/v1';
const KEY = 'sb_publishable_MpRBV0j74LSWcVgunpCMTw_ayBFK3Ca';

const q = async p => {
  const r = await fetch(`${URL_BASE}/${p}`, {headers:{apikey:KEY, Authorization:`Bearer ${KEY}`}});
  if(!r.ok) throw new Error(`${p} → ${r.status}`);
  return r.json();
};
const esc = s => (s??'').toString().replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pill = s => `<span class="pill p-${s==='en_consolidacion'?'cons':s==='adquirido'?'adq':s}">${esc(s).replace(/_/g,' ')}</span>`;
const ico = t => `<span class="i" data-tip="${esc(t)}">i</span>`;

/* ---------- Tooltips (hover en desktop, tap en móvil) ---------- */
const tipEl = () => document.getElementById('tip');
let activeIco = null;

function showTip(el){
  const t = tipEl();
  t.innerHTML = el.dataset.tip;
  t.classList.add('show');
  const r = el.getBoundingClientRect();
  const tw = t.offsetWidth, th = t.offsetHeight;
  let left = r.left + window.scrollX + r.width/2 - tw/2;
  left = Math.max(10, Math.min(left, window.innerWidth - tw - 10));
  let top = r.top + window.scrollY - th - 10;
  if(top < window.scrollY + 5) top = r.bottom + window.scrollY + 10;
  t.style.left = left + 'px';
  t.style.top = top + 'px';
  el.classList.add('on');
  activeIco = el;
}
function hideTip(){
  tipEl().classList.remove('show');
  if(activeIco){ activeIco.classList.remove('on'); activeIco = null; }
}
function bindTips(){
  document.querySelectorAll('.i').forEach(el=>{
    el.onmouseenter = () => showTip(el);
    el.onmouseleave = () => { if(!el.dataset.pinned) hideTip(); };
    el.onclick = e => {
      e.stopPropagation();
      if(activeIco === el){ hideTip(); } else { hideTip(); showTip(el); }
    };
  });
  document.addEventListener('click', hideTip);
  window.addEventListener('scroll', hideTip, {passive:true});
}

async function load(){
  try{
    const [sum, streak, lastS, todayP, series, sessions, funnel, errs, due, cal] = await Promise.all([
      q('v_dashboard_summary'), q('v_streak'), q('v_last_session'), q('v_today_plan'),
      q('v_benchmark_series?order=bench_date.asc'), q('v_session_trend?order=session_date.asc'),
      q('v_chunk_funnel'), q('v_error_watchlist?limit=8'), q('v_due_today?limit=10'), q('v_calendar')
    ]);
    render(sum[0], streak[0], lastS[0], todayP[0], series, sessions, funnel, errs, due, cal);
    bindTips();
  }catch(e){
    document.getElementById('app').innerHTML = `<div class="loading">No se pudo conectar: ${esc(e.message)}</div>`;
    document.getElementById('status').textContent = 'Sin conexión';
  }
}

function render(s, st, last, today, series, sessions, funnel, errs, due, cal){
  const base = series.length ? Number(series[0].overall) : 5.8;
  const trainedToday = cal.length && cal[cal.length-1].trained;
  const delta = last ? (Number(last.overall) - base) : 0;

  document.getElementById('status').innerHTML = `<b>● En vivo</b><br>${new Date().toLocaleString('es-MX')}`;

  const msg = trainedToday
    ? `Entrenaste hoy. Foco: <em>${esc(last.focus)}</em>.
       <small>${last.self_corrections} autocorrecciones · precisión en pasado ${Number(last.past_tense_accuracy||0).toFixed(0)}%</small>`
    : today
      ? `Toca sesión. Foco de hoy: <em>${esc(today.focus)}</em>.
         <small>${today.chunks_due} chunks por repasar · drill ${esc(today.drill_type||'3/2/1')}</small>`
      : `Sin plan cargado para hoy. <small>Pídele a Claude la clase del día.</small>`;

  const banner = `
  <div class="today">
    <div class="today-streak">
      <div class="streak-num">${st.current_streak}</div>
      <div class="streak-lbl">días seguidos ${ico('<b>Racha actual.</b> Días consecutivos entrenando. El efecto de espaciado dice que 30 min diarios sostenidos superan por mucho a sesiones largas y esporádicas. Si te saltas un día, vuelve a cero: es a propósito.')}</div>
    </div>
    <div class="today-msg">${msg}</div>
    <div class="today-badge ${trainedToday?'badge-done':'badge-pending'}">${trainedToday ? '✓ Hecho' : '○ Pendiente'}</div>
  </div>`;

  const kpis = `
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">Última sesión ${ico('<b>Promedio de las 6 categorías</b> de la rúbrica en tu última sesión, comparado con tu línea base (5.8). <b>Cuidado:</b> este score lo pone el modelo de voz y tiende a inflarse. Es directional, no verdad. La verdad es el benchmark del viernes.')}</div>
      <div class="kpi-val">${last ? Number(last.overall).toFixed(1) : '—'}${delta>0 ? `<span class="up">▲${delta.toFixed(1)}</span>` : ''}</div>
      <div class="kpi-sub">baseline ${base.toFixed(1)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Días entrenados ${ico('<b>Total de sesiones registradas.</b> Solo cuentan las que terminaron con reporte y quedaron en la base. Una sesión sin reporte no existe para el sistema.')}</div>
      <div class="kpi-val">${st.total_days}</div>
      <div class="kpi-sub">${st.days_last_7}/7 esta semana</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Mejor racha ${ico('<b>Tu récord</b> de días consecutivos. Está aquí porque la consistencia, no el volumen, es la variable que predice si esto funciona.')}</div>
      <div class="kpi-val">${st.longest_streak}</div>
      <div class="kpi-sub">días consecutivos</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Pasado correcto ${ico('<b>% de verbos en pasado correctos</b> al narrar. Es tu métrica dura ahora mismo: se cuenta sobre el transcript, no la opina nadie. Tu error #1 es empezar una historia en pasado y deslizarte al presente. Meta: 90%.')}</div>
      <div class="kpi-val">${last?.past_tense_accuracy ? Number(last.past_tense_accuracy).toFixed(0)+'%' : '—'}</div>
      <div class="kpi-sub">meta: 90%</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Chunks adquiridos ${ico('<b>Frases completas ya automatizadas.</b> Un chunk pasa a "adquirido" solo cuando lo usas <b>espontáneamente</b>, sin que nadie te lo pida, en una sesión posterior. Repetirlo en el drill no cuenta.')}</div>
      <div class="kpi-val">${s.chunks_adquiridos}<small>/${s.chunks_total}</small></div>
      <div class="kpi-sub">${s.chunks_due} por repasar</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Errores superados ${ico('<b>Errores que dejaste de cometer.</b> Un error se marca como superado tras 3 sesiones consecutivas sin que aparezca. Los de "microdrill" son los que ya cruzaron 3 ocurrencias y el sistema decidió atacar explícitamente.')}</div>
      <div class="kpi-val">${s.errores_superados}</div>
      <div class="kpi-sub">${s.errores_microdrill} en microdrill</div>
    </div>
  </div>`;

  const calHtml = cal.map((d,i)=>{
    const day = new Date(d.day+'T12:00:00');
    const isToday = i === cal.length-1;
    const cls = [d.trained ? (d.kind==='benchmark'?'bench':'on') : '', isToday?'today':''].filter(Boolean).join(' ');
    return `<div class="cal-day ${cls}" title="${d.day}${d.overall?' · '+d.overall:''}">${day.getDate()}</div>`;
  }).join('');

  const cats = [['Fluidez','score_fluidez','Continuidad, pausas, repeticiones, capacidad de terminar ideas sin cambiar al español.'],
                ['Gramática','score_gramatica','Tiempos verbales, orden de palabras, artículos, preposiciones, auxiliares. Tu categoría más baja.'],
                ['Recuperación','score_recuperacion','Rapidez para encontrar palabras y chunks bajo presión. El núcleo de tu diagnóstico.'],
                ['Estructura','score_estructura','Claridad del punto principal, orden lógico, uso de STAR o CAR.'],
                ['Claridad','score_claridad','Comprensibilidad, ritmo, terminaciones. NO penaliza tu acento mexicano.'],
                ['Impacto','score_impacto','Seguridad, uso de métricas, calidad de la respuesta para una entrevista real.']];
  const rub = last ? cats.map(([n,k,t])=>{
    const v = Number(last[k]||0);
    return `<div class="rub">
      <div class="rub-top"><span>${n} ${ico('<b>'+n+'.</b> '+t)}</span><em>${v.toFixed(1)}</em></div>
      <div class="rub-bar"><div class="rub-fill" style="width:${v*10}%"></div><div class="rub-goal" style="left:75%"></div></div>
    </div>`;
  }).join('') : '<em>Sin sesiones aún.</em>';

  const funnelHtml = funnel.map(f=>{
    const t=f.total||1;
    return `<div class="cat-row">
      <div class="cat-name"><span>${esc(f.category)}</span><em>${f.adquiridos}/${f.total}</em></div>
      <div class="bar">
        <span class="b-adq" style="width:${100*f.adquiridos/t}%"></span>
        <span class="b-cons" style="width:${100*f.en_consolidacion/t}%"></span>
        <span class="b-nuevo" style="width:${100*f.nuevos/t}%"></span>
      </div></div>`;
  }).join('');

  const errsHtml = errs.map(e=>`<tr>
      <td><strong>${esc(e.pattern)}</strong><br>
        <span class="mono wrong">✕ ${esc(e.example_wrong)}</span><br>
        <span class="mono right">✓ ${esc(e.example_right)}</span></td>
      <td>${pill(e.state)}</td>
      <td class="num"><strong>${e.occurrences}</strong><br><em>${e.self_corrections} autoc.</em></td>
    </tr>`).join('');

  const dueHtml = due.length ? due.map(d=>`<tr>
      <td class="mono">${esc(d.text)}</td><td>${pill(d.state)}</td><td class="num"><em>${d.interval_days}d</em></td>
    </tr>`).join('') : `<tr><td colspan="3"><em>Nada pendiente hoy.</em></td></tr>`;

  document.getElementById('app').innerHTML = banner + kpis + `
  <h2>Consistencia</h2>
  <div class="panel">
    <h3>Últimos 28 días ${ico('Verde = sesión regular. Azul marino = benchmark (viernes). Borde dorado = hoy. Media hora diaria sostenida le gana a una hora que abandonas en tres semanas.')}</h3>
    <p class="hint">La consistencia es la variable, no el volumen.</p>
    <div class="cal">${calHtml}</div>
    <div class="legend">
      <span><i style="background:var(--verde)"></i>Sesión</span>
      <span><i style="background:var(--navy)"></i>Benchmark</span>
      <span><i style="background:var(--crema-alt);border:1px solid var(--linea)"></i>Sin entrenar</span>
    </div>
  </div>

  <h2>Progreso</h2>
  <div class="grid2">
    <div class="panel">
      <h3>Score por sesión ${ico('Promedio de las 6 categorías, sesión a sesión. Línea verde = tu línea base (5.8). Línea dorada = meta B2 (7.5). <b>Estos scores son ruidosos</b> porque los asigna el modelo de voz, que tiende a elogiar. Úsalos como tendencia, nunca como verdad.')}</h3>
      <p class="hint">La verdad está en el benchmark del viernes, no aquí.</p>
      <div class="chart-box"><canvas id="c1"></canvas></div>
    </div>
    <div class="panel">
      <h3>Rúbrica — última sesión ${ico('Las 6 dimensiones que se evalúan. La línea dorada vertical marca la meta B2 (7.5). Toca la <b>i</b> de cada categoría para ver qué mide exactamente.')}</h3>
      <p class="hint">Gramática y recuperación son el cuello de botella.</p>
      ${rub}
    </div>
  </div>

  <h2>Motor de aprendizaje</h2>
  <div class="grid2">
    <div class="panel">
      <h3>Funnel de chunks ${ico('El viaje de cada frase: <b>Nuevo</b> → <b>En consolidación</b> (3 recuperaciones correctas) → <b>Adquirido</b> (uso espontáneo, sin que te lo pidan). El objetivo es empujar todo hacia la izquierda: de conocimiento pasivo a automático.')}</h3>
      <p class="hint">De pasivo a automático.</p>
      ${funnelHtml}
      <div class="legend">
        <span><i class="b-adq"></i>Adquirido</span><span><i class="b-cons"></i>En consolidación</span><span><i class="b-nuevo"></i>Nuevo</span>
      </div>
    </div>
    <div class="panel">
      <h3>Repasos de hoy ${ico('Los chunks que el algoritmo programó para hoy. Intervalos <b>expansivos</b>: 1 → 3 → 7 → 21 días. Si fallas uno, se resetea a 1 día. La agenda la dicta el algoritmo, no la intuición.')}</h3>
      <p class="hint">Recuperación productiva, no repetición.</p>
      <table><thead><tr><th>Chunk</th><th>Estado</th><th class="num">Int.</th></tr></thead><tbody>${dueHtml}</tbody></table>
    </div>
  </div>

  <h2>Watchlist de errores</h2>
  <div class="panel">
    <h3>Qué vigilar ${ico('Las <b>reglas de adaptación</b> corren solas en la base de datos: 3 ocurrencias → el error pasa a <b>microdrill</b> y se ataca explícitamente. 3 autocorrecciones en contextos distintos → <b>en consolidación</b>. 3 sesiones limpias → <b>superado</b>.')}</h3>
    <p class="hint">Máximo 3 errores por sesión. Corregir veinte cosas no corrige ninguna.</p>
    <table><thead><tr><th>Patrón</th><th>Estado</th><th class="num">Veces</th></tr></thead><tbody>${errsHtml}</tbody></table>
  </div>

  <h2>Metodología</h2>
  <div class="method" id="method">
    <div class="method-head" id="methodHead">
      <div>
        <h3>Cómo funciona este plan</h3>
        <p>Las técnicas detrás del sistema, la evidencia que las respalda, y lo que aún no sabemos.</p>
      </div>
      <div class="chev">⌄</div>
    </div>
    <div class="method-body">
      <p style="font-size:15.5px;margin-bottom:8px"><strong>El diagnóstico:</strong> tu problema no es lo que sabes. Reconoces las formas correctas al escucharlas y puedes repetirlas — pero no aparecen cuando las necesitas. Eso tiene nombre en psicolingüística: tienes conocimiento <em>declarativo</em> pero no <em>automatizado</em>. Son sistemas de memoria distintos, y entrenar el primero no produce el segundo.</p>
      <p style="font-size:15.5px;margin-bottom:20px"><strong>La consecuencia de diseño:</strong> cada minuto estudiando reglas o listas es un minuto mal asignado. La sesión es casi 100% producción oral bajo presión de tiempo.</p>

      <div class="tech">
        <div class="tech-n">1</div>
        <div>
          <h4>Recuperación espaciada <span class="ev ev-alta">Evidencia muy fuerte</span></h4>
          <p>Recuperar de memoria en intervalos que se expanden (1 → 3 → 7 → 21 días). Un meta-análisis de 242 estudios y ~169,000 participantes concluyó que las dos técnicas más efectivas de todo el repertorio son la práctica distribuida y el <em>practice testing</em>. Cada recuperación exitosa fortalece la memoria; releer no.</p>
          <p class="src">Es el motor de la tabla de chunks: la agenda de repaso la dicta el algoritmo.</p>
        </div>
      </div>

      <div class="tech">
        <div class="tech-n">2</div>
        <div>
          <h4>Repetición de tarea 3/2/1 <span class="ev ev-alta">Evidencia fuerte</span></h4>
          <p>La misma historia tres veces, con tiempo decreciente y audiencia distinta. De Jong &amp; Perfetti (2011) demostraron con asignación aleatoria que el grupo que repetía el mismo tema ganó fluidez, y que esa ganancia <strong>transfirió a temas nuevos</strong> — proceduralización real, no memorización de un guión. La presión de tiempo es obligatoria: sin ella no hay automatización.</p>
          <p class="src">Adaptado de 4/3/2 a 3/2/1 para caber en 30 minutos. Lo que importa es la presión decreciente, no los minutos absolutos.</p>
        </div>
      </div>

      <div class="tech">
        <div class="tech-n">3</div>
        <div>
          <h4>Chunks, no palabras sueltas <span class="ev ev-alta">Evidencia fuerte</span></h4>
          <p>Las secuencias formulaicas se procesan como una sola unidad, liberando memoria de trabajo, y funcionan como "zonas de seguridad": confinan el riesgo de error al espacio <em>entre</em> chunks. Boers et al. (2006) mostraron que su uso eleva las calificaciones de fluidez percibida. La instrucción explícita supera a la exposición pasiva — pero solo si el chunk se aplica de inmediato a algo real.</p>
          <p class="src">Por eso el drill nunca te pide repetir: te pide construir una frase nueva sobre tu vida.</p>
        </div>
      </div>

      <div class="tech">
        <div class="tech-n">4</div>
        <div>
          <h4>Corrección por prompts, no recasts <span class="ev ev-alta">Evidencia fuerte</span></h4>
          <p>Cuando cometes un error, es más efectivo que el tutor te lo <em>señale</em> y te deje autocorregir ("Hmm — ¿tiempo verbal?") que reformular la frase correcta por ti. Lyster &amp; Saito (2010) encontraron que los <em>prompts</em> superan a los <em>recasts</em>, sobre todo en producción libre. El problema: el recast es lo que ChatGPT hace por default, y muchas veces ni registras que hubo corrección.</p>
          <p class="src">Por eso el prompt diario le prohíbe explícitamente reformular sin señalar. Tus 9 autocorrecciones de la sesión 1 son evidencia de que funciona.</p>
        </div>
      </div>

      <div class="tech">
        <div class="tech-n">5</div>
        <div>
          <h4>Shadowing de terminaciones <span class="ev ev-media">Evidencia moderada</span></h4>
          <p>Repetir en simultáneo sobre un audio. Una revisión de 44 estudios encuentra mejoras en pronunciación, pero con problemas metodológicos frecuentes. Uso quirúrgico: solo para tu dificultad con <em>ask</em> vs <em>asked</em> (/t/, /d/, /ɪd/). El estándar correcto es la <strong>inteligibilidad</strong>, no el acento nativo — que es una meta inalcanzable para la mayoría de adultos y además irrelevante.</p>
          <p class="src">Tu pronunciación ya es tu categoría más alta. No es el cuello de botella.</p>
        </div>
      </div>

      <div class="rules">
        <h4>Reglas de adaptación (corren solas en la base de datos)</h4>
        <ul>
          <li>Un error que aparece <strong>3 veces</strong> se convierte en microdrill explícito.</li>
          <li><strong>3 autocorrecciones</strong> en contextos distintos → el error pasa a "en consolidación".</li>
          <li><strong>3 sesiones limpias</strong> sin cometerlo → "superado".</li>
          <li>Un chunk usado <strong>espontáneamente</strong> (fuera del drill) → "adquirido". Repetirlo no cuenta.</li>
          <li>Si fallas un chunk, su intervalo <strong>se resetea a 1 día</strong>.</li>
          <li>El foco solo sube de dificultad tras <strong>dos sesiones</strong> consecutivas de mejora, no una.</li>
          <li>Máximo <strong>3 correcciones</strong> por tarea. Corregir veinte cosas no corrige ninguna.</li>
        </ul>
      </div>

      <div class="caveat">
        <h4>La letra chica</h4>
        <p>Casi toda esta literatura se produjo con maestros humanos en aulas: <strong>ningún estudio citado usó tutores de IA por voz</strong>. Estamos transfiriendo mecanismos a un medio nuevo, lo cual es razonable, pero es transferencia — no evidencia directa. Por eso el benchmark semanal no es un accesorio: es la validación empírica del sistema. Si en 8 semanas la serie del viernes no se mueve, el problema no es tu inglés, es el diseño, y se ajusta.</p>
      </div>

      <div class="refs">
        <h4>Fuentes</h4>
        <ol>
          <li><b>Takizawa et al. (2025).</b> Applied Linguistics. El vocabulario automatizado predice la fluidez ~10× mejor que el memorizado (n = 210).</li>
          <li><b>De Jong &amp; Perfetti (2011).</b> Language Learning. Repetición de tarea 4/3/2: las ganancias de fluidez transfieren a temas nuevos.</li>
          <li><b>Nation (1989).</b> System. Técnica 4/3/2 original: aumenta velocidad, reduce vacilaciones.</li>
          <li><b>Boers et al. (2006).</b> Language Teaching Research. Las secuencias formulaicas elevan la fluidez percibida.</li>
          <li><b>Lyster &amp; Saito (2010).</b> Studies in Second Language Acquisition. Meta-análisis: los prompts superan a los recasts.</li>
          <li><b>Dunlosky et al. (2013)</b> / <b>Hattie &amp; Donoghue (2021).</b> Meta-análisis de técnicas de aprendizaje: práctica distribuida y practice testing son las más efectivas.</li>
          <li><b>Whitworth et al. (2025).</b> Revisión sistemática de 44 estudios sobre shadowing.</li>
          <li><b>Levis (2005, 2020).</b> Principio de Inteligibilidad: el acento nativo no es prerrequisito de comunicación exitosa.</li>
          <li><b>Segalowitz (2010).</b> Cognitive Bases of Second Language Fluency. La fluidez cognitiva sustenta la fluidez del habla.</li>
          <li><b>Línea base del alumno:</b> reporte diagnóstico sobre 2 sesiones de voz, julio 2026.</li>
        </ol>
      </div>
    </div>
  </div>`;

  document.getElementById('methodHead').onclick = () =>
    document.getElementById('method').classList.toggle('open');

  document.getElementById('foot').innerHTML =
    `Datos en vivo desde Supabase · lectura con RLS. Escritura únicamente vía Claude (MCP).
     Baseline: reporte diagnóstico, julio 2026 · ${sessions.length} ${sessions.length===1?'sesión registrada':'sesiones registradas'}.`;

  drawChart(series, sessions, base);
}

function drawChart(series, sessions, base){
  const G = getComputedStyle(document.documentElement);
  const navy=G.getPropertyValue('--navy').trim(), dorado=G.getPropertyValue('--dorado').trim(),
        linea=G.getPropertyValue('--linea').trim(), verde=G.getPropertyValue('--verde').trim();
  Chart.defaults.font.family='Georgia, serif';
  Chart.defaults.color=G.getPropertyValue('--tinta-suave').trim();

  const labels = sessions.map((x,i)=>`S${i+1}`);
  const data = sessions.map(x=>Number(x.overall));

  new Chart(document.getElementById('c1'),{
    type:'line',
    data:{labels: labels.length?labels:['—'], datasets:[
      {label:'Sesión', data:data, borderColor:navy, backgroundColor:'rgba(15,30,61,.08)',
       borderWidth:2.5, fill:true, tension:.3, pointRadius:5, pointBackgroundColor:navy},
      {label:`Baseline (${base.toFixed(1)})`, data:labels.map(()=>base), borderColor:verde,
       borderWidth:1.5, borderDash:[4,4], pointRadius:0, fill:false},
      {label:'Meta B2 (7.5)', data:labels.map(()=>7.5), borderColor:dorado,
       borderWidth:1.5, borderDash:[5,4], pointRadius:0, fill:false}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{y:{min:4,max:10,grid:{color:linea}},x:{grid:{display:false}}},
      plugins:{legend:{labels:{boxWidth:12,font:{size:10}}}}}
  });
}

load();
</script>
